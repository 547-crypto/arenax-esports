services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arenax
      POSTGRES_PASSWORD: arenax_password
      POSTGRES_DB: arenax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenax -d arenax"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: .
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
